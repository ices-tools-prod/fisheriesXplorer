name: Deploy fisheriesXplorer (shinyapps.io)

on:
  push:
    branches:
      - development
      - release

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'release' && 'prod' || 'dev' }}

    env:
      CI: "true"
      SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
      SHINYAPPS_TOKEN:   ${{ secrets.SHINYAPPS_TOKEN }}
      SHINYAPPS_SECRET:  ${{ secrets.SHINYAPPS_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libcairo2-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libudunits2-dev \
            gdal-bin \
            libgdal-dev \
            libgeos-dev \
            libproj-dev

      - name: Restore renv environment
        uses: r-lib/actions/setup-renv@v2

      - name: Deploy fisheriesXplorer
        run: |
          Rscript scripts/deploy_shinyapps.R